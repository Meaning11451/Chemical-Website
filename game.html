<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小蜜蜂游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 导航栏 ── */
  .navbar {
    background: #141428;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    flex-shrink: 0;
  }
  .navbar .logo { font-size: 1.1rem; font-weight: 700; color: #ffcc00; text-decoration: none; }
  .navbar .nav-links { display: flex; gap: 4px; }
  .navbar .nav-links a {
    color: #999; text-decoration: none; padding: 8px 16px;
    border-radius: 8px; font-size: 0.9rem; transition: all 0.2s;
  }
  .navbar .nav-links a:hover,
  .navbar .nav-links a.active { color: #fff; background: rgba(255,255,255,0.08); }

  /* ── 游戏区域 ── */
  .game-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .game-card {
    background: #1a1a2e;
    border-radius: 20px;
    padding: 24px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    text-align: center;
  }

  .game-card h2 {
    font-size: 1.5rem;
    color: #ffcc00;
    margin-bottom: 4px;
  }

  .game-card .subtitle {
    color: #888;
    font-size: 0.8rem;
    margin-bottom: 14px;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .stat {
    background: #16213e;
    border-radius: 10px;
    padding: 8px 18px;
    min-width: 70px;
  }

  .stat .label {
    font-size: 0.65rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat .value {
    font-size: 1.2rem;
    font-weight: bold;
    color: #e0e0ff;
  }

  canvas {
    display: block;
    margin: 0 auto;
    border-radius: 12px;
    background: #0a0a15;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    max-width: 100%;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  button {
    padding: 9px 24px;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  button:active { transform: scale(0.96); }

  .btn-restart {
    background: #ffcc00;
    color: #1a1a2e;
  }
  .btn-restart:hover { background: #ffe44d; }

  .btn-pause {
    background: #333366;
    color: #ccc;
  }
  .btn-pause:hover { background: #444488; }

  .hint {
    margin-top: 10px;
    color: #555;
    font-size: 0.7rem;
  }

  .footer {
    text-align: center;
    padding: 16px 20px;
    color: #444;
    font-size: 0.75rem;
    border-top: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">⚗️ 化工控制学习站</a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="device.html">装置说明书</a>
    <a href="experiments.html">实验项目</a>
    <a href="game.html" class="active">休闲一下</a>
  </div>
</nav>

<div class="game-wrapper">
  <div class="game-card">
    <h2>🎮 休闲一下</h2>
    <p class="subtitle">经典小蜜蜂 · 消灭入侵的蜜蜂!</p>

    <div class="stats">
      <div class="stat">
        <div class="label">分数</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="label">生命</div>
        <div class="value" id="lives">❤️❤️❤️</div>
      </div>
      <div class="stat">
        <div class="label">关卡</div>
        <div class="value" id="level">1</div>
      </div>
    </div>

    <canvas id="game" width="420" height="460"></canvas>

    <div class="controls">
      <button class="btn-restart" onclick="restart()">🔄 重新开始</button>
      <button class="btn-pause" onclick="togglePause()" id="btnPause">⏯️ 暂停</button>
    </div>
    <p class="hint">← → 移动 &nbsp;|&nbsp; 空格射击</p>
  </div>
</div>

<div class="footer">
  <p style="margin-bottom:6px;">📧 <strong>联系我们</strong>：<a href="mailto:981060226@qq.com" style="color:#ffcc00;">981060226@qq.com</a></p>
  <p style="color:#444;">💛 赞助支持 · 合作交流 · 欢迎联系</p>
  <p style="margin-top:6px;">© 2025 化工控制技术学习站 · Powered by GitHub Pages</p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let player, bees, bullets, particles, score, lives, level, gameOver, paused, keys;

function createPlayer() {
  return { x: canvas.width / 2, y: canvas.height - 45, w: 36, h: 28, speed: 5, cooldown: 0 };
}

function createBee(x, y, type) {
  return { x, y, w: 30, h: 28, type: type || 'normal', speed: type === 'fast' ? 1.5 : type === 'boss' ? 0.8 : 0.6, dir: 1, alive: true, frame: 0 };
}

function createBullet(x, y) {
  return { x, y, w: 4, h: 12, speed: 7, alive: true };
}

function createParticle(x, y, color) {
  return { x, y, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3 - 1, life: 1, decay: 0.02 + Math.random() * 0.04, color, size: 2 + Math.random() * 3 };
}

function spawnBees() {
  const bees = [];
  const cols = 7;
  // 最多5排，避免刷到玩家脸上。之后靠速度和 Boss 数量提难度
  const rows = Math.min(5, 3 + level);
  const startX = 60, startY = 40, gapX = 46, gapY = 40;
  // 高阶增加 fast 和 boss 比例
  const fastRatio = Math.min(0.5, 0.1 + level * 0.06);
  const bossCount = 1 + Math.floor(level / 3);
  const bossCols = new Set();
  for (let i = 0; i < bossCount; i++) {
    bossCols.add(Math.floor(Math.random() * cols));
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let type = 'normal';
      if (r <= 1 && Math.random() < fastRatio) type = 'fast';
      if (r === rows - 1 && bossCols.has(c)) type = 'boss';
      const bee = createBee(startX + c * gapX, startY + r * gapY, type);
      // 高阶整体加速（每关+8%，上限2倍）
      const speedMul = Math.min(2, 0.9 + level * 0.08);
      bee.speed *= speedMul;
      bees.push(bee);
    }
  }
  return bees;
}

function init() {
  player = createPlayer();
  bees = spawnBees();
  bullets = [];
  particles = [];
  score = 0;
  lives = 3;
  level = 1;
  gameOver = false;
  paused = false;
  keys = {};
  updateUI();
}

function restart() {
  init();
  document.getElementById('btnPause').textContent = '⏯️ 暂停';
}

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶️ 继续' : '⏯️ 暂停';
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
  document.getElementById('level').textContent = level;
}

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
  if (e.key === ' ' && gameOver) restart();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function drawPlayer() {
  const { x, y, w, h } = player;
  ctx.fillStyle = '#4dc9f6';
  ctx.beginPath();
  ctx.moveTo(x, y - h/2);
  ctx.lineTo(x - w/2, y + h/2);
  ctx.lineTo(x - w/4, y + h/4);
  ctx.lineTo(x + w/4, y + h/4);
  ctx.lineTo(x + w/2, y + h/2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e0f7ff';
  ctx.beginPath();
  ctx.arc(x, y - 2, 7, 0, Math.PI * 2);
  ctx.fill();
  const flicker = Math.sin(Date.now() * 0.03) * 3;
  ctx.fillStyle = '#ff8844';
  ctx.beginPath();
  ctx.moveTo(x - 5, y + h/2);
  ctx.lineTo(x, y + h/2 + 12 + flicker);
  ctx.lineTo(x + 5, y + h/2);
  ctx.closePath();
  ctx.fill();
}

function drawBee(b) {
  const { x, y, w, h, type } = b;
  ctx.save();
  ctx.translate(x, y);
  const wingFlap = Math.sin(Date.now() * 0.015 + x) * 4;
  const bodyColor = type === 'boss' ? '#ff4444' : type === 'fast' ? '#ff8800' : '#ffbb33';
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, w/2, h/2.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.arc(i * 5, 0, w/2.8, -0.6, 0.6);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(200,220,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(-8, -12 - wingFlap, 10, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -12 - wingFlap, 10, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-6, -5, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -5, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-5, -5, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -5, 2, 0, Math.PI * 2); ctx.fill();
  if (type === 'boss') {
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.moveTo(-6, -16);
    ctx.lineTo(-10, -26);
    ctx.lineTo(0, -22);
    ctx.lineTo(10, -26);
    ctx.lineTo(6, -16);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawBullet(b) {
  ctx.fillStyle = '#ffee44';
  ctx.shadowColor = '#ffee44';
  ctx.shadowBlur = 6;
  ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  ctx.shadowBlur = 0;
}

function drawParticle(p) {
  ctx.fillStyle = p.color;
  ctx.globalAlpha = p.life;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function update() {
  if (gameOver || paused) return;
  if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
  player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
  if (player.cooldown > 0) player.cooldown--;
  if ((keys[' '] || keys['ArrowUp'] || keys['w']) && player.cooldown <= 0) {
    bullets.push(createBullet(player.x, player.y - 20));
    player.cooldown = 12;
  }
  for (let b of bullets) { b.y -= b.speed; if (b.y < -10) b.alive = false; }
  bullets = bullets.filter(b => b.alive);
  let edgeReached = false;
  for (let b of bees) { b.x += b.speed * b.dir; if (b.x > canvas.width - 30 || b.x < 30) edgeReached = true; }
  if (edgeReached) { for (let b of bees) { b.dir *= -1; b.y += 12; } }
  for (let b of bees) {
    for (let bullet of bullets) {
      if (!bullet.alive || !b.alive) continue;
      if (Math.abs(bullet.x - b.x) < b.w/2 && Math.abs(bullet.y - b.y) < b.h/2) {
        b.alive = false; bullet.alive = false;
        score += b.type === 'boss' ? 30 : b.type === 'fast' ? 15 : 10;
        for (let i = 0; i < 8; i++) particles.push(createParticle(b.x, b.y, b.type === 'boss' ? '#ff4444' : b.type === 'fast' ? '#ff8800' : '#ffbb33'));
      }
    }
    if (b.alive && Math.abs(player.x - b.x) < (player.w + b.w)/2 && Math.abs(player.y - b.y) < (player.h + b.h)/2) {
      b.alive = false; lives--;
      for (let i = 0; i < 12; i++) particles.push(createParticle(player.x, player.y, '#ff4444'));
      if (lives <= 0) gameOver = true;
    }
    if (b.alive && b.y > canvas.height - 40) { lives--; b.alive = false; if (lives <= 0) gameOver = true; }
  }
  bees = bees.filter(b => b.alive);
  bullets = bullets.filter(b => b.alive);
  for (let p of particles) { p.life -= p.decay; p.x += p.vx; p.y += p.vy; }
  particles = particles.filter(p => p.life > 0);
  if (bees.length === 0 && !gameOver) { level++; bees = spawnBees(); player = createPlayer(); bullets = []; }
  updateUI();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 36px "Segoe UI", system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 10);
  ctx.fillStyle = '#ccc';
  ctx.font = '16px "Segoe UI", system-ui';
  ctx.fillText('按空格键重新开始', canvas.width/2, canvas.height/2 + 30);
}

function drawPaused() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px "Segoe UI", system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('⏸️ 已暂停', canvas.width/2, canvas.height/2);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 97 + 13) % canvas.width;
    const sy = (i * 61 + 7 + Date.now() * 0.02 * (i % 3 + 1)) % canvas.height;
    ctx.globalAlpha = 0.3 + (i % 3) * 0.2;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;
  for (let b of bees) drawBee(b);
  for (let bullet of bullets) drawBullet(bullet);
  for (let p of particles) drawParticle(p);
  drawPlayer();
  if (gameOver) drawGameOver();
  if (paused && !gameOver) drawPaused();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

init();
loop();
</script>

</body>
</html>
